name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub release

jobs:
  build:
    name: Build cross-platform binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.target.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/officetowd${ext} ./cmd/officetowd
          tar czf officetowd-${{ matrix.target.goos }}-${{ matrix.target.goarch }}.tar.gz -C dist officetowd${ext}
      - uses: actions/upload-artifact@v4
        with:
          name: officetowd-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: officetowd-${{ matrix.target.goos }}-${{ matrix.target.goarch }}.tar.gz
          retention-days: 1

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: officetowd-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Generate checksums
        run: |
          cd dist
          sha256sum officetowd-*.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/officetowd-*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
